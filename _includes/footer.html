<footer class="site-footer">
  <div class="wrap">
    <div class="footer-col footer-col-1">
      <p class="footer-heading">{{ site.title }}</p>
      <p>{{ site.description }}</p>
    </div>
    <div class="footer-col footer-col-2">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}</p>
    </div>
  </div>
</footer>
