title: Mike's Blog
description: Personal blog and thoughts
author: Mike Loven
url: "https://blog.mikeloven.com"
baseurl: ""

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/
highlighter: rouge
kramdown:
  input: GFM
  auto_ids: true
  syntax_highlighter: rouge

# Exclude from processing
exclude:
  - scripts/
  - templates/
  - Gemfile
  - Gemfile.lock
  - README.md
  - .obsidian/
  - Attachments/

# Collections
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
